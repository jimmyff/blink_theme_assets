# Light UI Fragment
# Apply this fragment to a dark theme to create a light variant.
# This overrides UI scopes while preserving syntax highlighting from the parent.

[variables]
# Override brightness for light backgrounds (darker colors for readability)
tone-syntax-bright = "100"
tone-syntax-medium = "200"
tone-syntax-accent = "50"
color-badge = "azure"
[scopes]

# "ui.chrome.navbar.item.background:hover" = { bg = "$chrome-background-hover", border = { width = 3, fg = "@rainbow:blue-600" } }

# "ui.chrome.navbar.item.icon:hover" = { fg = "oklch(0.68 0.1 210)" }
# "ui.chrome.navbar.item.icon" = { fg =" oklch(0.62 0.1 210)" }

[palette]
background = "oklch(0.24 0.077 312.43)"
background-alt = "oklch(0.22 0.077 312.43)"
background-hover = "oklch(0.21 0.077 312.43)" # Row hover

background-overlay = "oklch(0.19 0.077 312.43)"

border-fg = "oklch(0.33 0.077 317.52)"
chrome-border-fg = "oklch(0.33 0.077 317.52)"

chrome-background = "oklch(0.22 0.077 312.43)"
chrome-background-hover = "oklch(0.18 0.077 312.43)"
chrome-background-active = "oklch(0.18 0.077 312.43)"


# # Light mode text colors
foreground = "#ffffff" #"oklch(0.88 0.07 189)"
foreground-hover = "@rainbow:neutralWarm-100"
foreground-alt = "oklch(0.7 0.07 316)"
foreground-alt-hover = "oklch(0.8 0.07 316)"
foreground-dim = "oklch(0.5 0.07 316)"
foreground-dim-hover= "oklch(0.6 0.07 316)"

chrome-foreground = "oklch(0.69 0.07 316)"
chrome-foreground-hover = "oklch(0.76 0.07 316)"
chrome-foreground-alt = "oklch(0.6 0.07 316)"
chrome-foreground-alt-hover = "oklch(0.68 0.07 316)"
chrome-foreground-dim = "oklch(0.4 0.07 316)"
chrome-foreground-dim-hover = "oklch(0.48 0.07 316)"

menu-background = "oklch(0.19 0.077 312.43)"
menu-background-hover = "oklch(0.24 0.0696 312.43)"
menu-border = "oklch(0.39 0.0636 317.52)"
